name: Docker Build and Push

on:
  schedule:
    # Build weekly on Sundays at 2 AM UTC
    - cron: '0 2 * * 0'
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ${{ github.repository }}/pf-backend
  IMAGE_NAME_FRONTEND: ${{ github.repository }}/pf-frontend

jobs:
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=sha,prefix=
          type=raw,value=latest,enable={{is_default_branch}}
        labels: |
          org.opencontainers.image.title=Project F.O.N.E Backend
          org.opencontainers.image.description=Eye-tracking backend service using MediaPipe
          org.opencontainers.image.vendor=Project F.O.N.E
          org.opencontainers.image.licenses=MIT

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./pf-backend
        file: ./pf-backend/Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64

  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=sha,prefix=
          type=raw,value=latest,enable={{is_default_branch}}
        labels: |
          org.opencontainers.image.title=Project F.O.N.E Frontend
          org.opencontainers.image.description=Web interface with virtual keyboard and AI suggestions
          org.opencontainers.image.vendor=Project F.O.N.E
          org.opencontainers.image.licenses=MIT

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./pf-frontend
        file: ./pf-frontend/Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64

  build-compose:
    name: Test Docker Compose
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Create test environment
      run: |
        cp .env.example .env
        sed -i 's/your-gemini-api-key-here/test-key/' .env
        sed -i 's/Athens, Greece/Test Location/' .env

    - name: Test Docker Compose build
      run: |
        docker-compose build

    - name: Test Docker Compose configuration
      run: |
        docker-compose config

    - name: Test services start
      run: |
        # Start services in background
        docker-compose up -d
        
        # Wait for services to be ready
        sleep 30
        
        # Check if containers are running
        if ! docker-compose ps | grep "Up"; then
          echo "Some services failed to start"
          docker-compose logs
          exit 1
        fi
        
        echo "All services started successfully"

    - name: Cleanup
      if: always()
      run: |
        docker-compose down -v
        docker system prune -f

  update-readme:
    name: Update Documentation
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Update README with latest image tags
      run: |
        # Update README with current image information
        sed -i "s|ghcr.io/.*pf-backend.*|ghcr.io/${{ github.repository }}/pf-backend:latest|g" README.md
        sed -i "s|ghcr.io/.*pf-frontend.*|ghcr.io/${{ github.repository }}/pf-frontend:latest|g" README.md
        
        # Update last build date
        echo "Last built: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> .build-info

    - name: Commit changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        if git diff --quiet; then
          echo "No changes to commit"
        else
          git add README.md .build-info
          git commit -m "docs: Update README with latest build info [skip ci]"
          git push
        fi