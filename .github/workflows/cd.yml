name: CD - Release and Deploy

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release'
        required: true
        default: 'latest'

env:
  REGISTRY: ghcr.io

jobs:
  build-and-publish:
    name: Build and Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      repo_name: ${{ steps.repo_name.outputs.name }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Get version
      id: version
      run: |
        if [ "${{ github.event_name }}" == "release" ]; then
          VERSION=${{ github.event.release.tag_name }}
        else
          VERSION=${{ github.event.inputs.version }}
        fi
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "Version: ${VERSION}"

    - name: Generate lowercase repository name
      id: repo_name
      run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

    - name: Build and push backend image
      uses: docker/build-push-action@v5
      with:
        context: ./pf-backend
        file: ./pf-backend/Dockerfile
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ steps.repo_name.outputs.name }}/pf-backend:${{ steps.version.outputs.version }}
          ${{ env.REGISTRY }}/${{ steps.repo_name.outputs.name }}/pf-backend:latest
        labels: |
          org.opencontainers.image.title=Project F.O.N.E Backend
          org.opencontainers.image.description=Eye-tracking backend service
          org.opencontainers.image.version=${{ steps.version.outputs.version }}
          org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64

    - name: Build and push frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./pf-frontend
        file: ./pf-frontend/Dockerfile
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ steps.repo_name.outputs.name }}/pf-frontend:${{ steps.version.outputs.version }}
          ${{ env.REGISTRY }}/${{ steps.repo_name.outputs.name }}/pf-frontend:latest
        labels: |
          org.opencontainers.image.title=Project F.O.N.E Frontend
          org.opencontainers.image.description=Web interface with virtual keyboard
          org.opencontainers.image.version=${{ steps.version.outputs.version }}
          org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64

    - name: Create deployment artifacts
      run: |
        ./scripts/create_deployment_artifacts.sh \
          ${{ steps.version.outputs.version }} \
          ${{ env.REGISTRY }} \
          ${{ steps.repo_name.outputs.name }}/pf-backend \
          ${{ steps.repo_name.outputs.name }}/pf-frontend

    - name: Upload release artifacts
      uses: actions/upload-artifact@v4
      with:
        name: deployment-package-${{ steps.version.outputs.version }}
        path: |
          project-fone-${{ steps.version.outputs.version }}-deployment.tar.gz
          release-artifacts/

    - name: Attach to release
      if: github.event_name == 'release'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./project-fone-${{ steps.version.outputs.version }}-deployment.tar.gz
        asset_name: project-fone-${{ steps.version.outputs.version }}-deployment.tar.gz
        asset_content_type: application/gzip

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-and-publish
    
    steps:
    - name: Run Trivy vulnerability scanner - Backend
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/${{ needs.build-and-publish.outputs.repo_name }}/pf-backend:latest
        format: 'sarif'
        output: 'backend-trivy-results.sarif'

    - name: Run Trivy vulnerability scanner - Frontend
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/${{ needs.build-and-publish.outputs.repo_name }}/pf-frontend:latest
        format: 'sarif'
        output: 'frontend-trivy-results.sarif'

    - name: Upload Trivy scan results to GitHub Security
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: '.'